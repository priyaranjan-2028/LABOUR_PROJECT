{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - LabourConnect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .forgot-container {
            background: white;
            padding: 2.5rem 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .forgot-container h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: #166088;
        }

        .forgot-container form {
            display: flex;
            flex-direction: column;
        }

        .forgot-container input {
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .forgot-container button {
            padding: 1rem;
            background-color: #166088;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .forgot-container button:hover {
            background-color: #0f4f66;
        }

        .form-footer {
            text-align: center;
            margin-top: 1rem;
        }

        .form-footer a {
            color: #166088;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <h2>Reset Password</h2>
        <form method="POST" action="{% url 'forget_password' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="new_password" placeholder="New Password" required>
            <button type="submit">Submit</button>
        </form>
        <div class="form-footer">
            <p>Remembered your password? <a href="{% url 'login' %}">Login</a></p>
        </div>
        {% if error %}
            <p style="color:red; text-align:center; margin-top:1rem;">{{ error }}</p>
        {% endif %}
        {% if success %}
            <p style="color:green; text-align:center; margin-top:1rem;">{{ success }}</p>
        {% endif %}
    </div>
</body>
</html>
