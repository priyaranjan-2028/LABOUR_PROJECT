{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Email Verification</title>

<style>

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Inter, sans-serif;
}

.card{
    background:white;
    padding:40px;
    border-radius:14px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h3{
    margin-bottom:15px;
    color:#0f3b3a;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-top:10px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#0f3b3a;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1a4b4a;
}

</style>
</head>

<body>

<div class="card">

<h3>Verify Email OTP</h3>

<form method="POST" action="{% url 'varify_otp_user' %}">
{% csrf_token %}

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

</div>

</body>
</html>
