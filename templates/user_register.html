<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Registration - LabourConnect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% load static %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f9fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
        }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; }
        .register-wrapper {
            display: flex;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            border: 1px solid #edf2f7;
        }
        /* Left Side */
        .brand-side {
            flex: 1;
            background: #0f3b3a;
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            color: white;
        }
        .brand-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 60px; }
        .brand-logo i { font-size: 32px; color: #2dd4bf; }
        .brand-logo span { font-size: 24px; font-weight: 700; }
        .brand-tagline h2 { font-size: 36px; line-height: 1.2; margin-bottom: 20px; }
        .brand-tagline h2 span { color: #2dd4bf; }
        .feature-list { margin-top: 40px; display: flex; flex-direction: column; gap: 30px; }
        .feature-item { display: flex; gap: 15px; }
        .feature-icon {
            width: 44px; height: 44px; background: rgba(45, 212, 191, 0.15);
            border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #2dd4bf;
        }
        /* Right Side Form */
        .form-side { flex: 1.4; padding: 60px; background: #ffffff; }
        .form-header { margin-bottom: 32px; }
        .form-header h1 { font-size: 28px; margin-bottom: 8px; }
        .form-header p { color: #64748b; }
        .form-header a { color: #0f3b3a; text-decoration: none; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600; color: #475569;
            margin-bottom: 8px; text-transform: uppercase;
        }
        .input-field {
            width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0;
            border-radius: 10px; font-size: 14px; transition: all 0.2s;
        }
        .input-field:focus { outline: none; border-color: #0f3b3a; box-shadow: 0 0 0 3px rgba(15, 59, 58, 0.05); }
        .phone-input-group { display: grid; grid-template-columns: 100px 1fr; gap: 10px; }
        .btn-submit {
            width: 100%; padding: 14px; background: #0f3b3a; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-top: 20px; transition: 0.2s;
        }
        .btn-submit:hover { background: #164e4d; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 5px; }
        /* Responsive */
        @media (max-width: 992px) { .register-wrapper { flex-direction: column; } }
        @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="register-wrapper">
        <div class="brand-side">
            <div class="brand-logo">
                <i class="fas fa-briefcase"></i>
                <span>LabourConnect</span>
            </div>
            <div class="brand-tagline">
                <h2>Hire skilled<br><span>workers today.</span></h2>
            </div>
            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-shield-alt"></i></div>
                    <div><strong>Verified Experts</strong></div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                    <div><strong>Instant Matching</strong></div>
                </div>
            </div>
        </div>

        <div class="form-side">
            <div class="form-header">
                <h1>Join as an Employer</h1>
                <p>Already have an account? <a href="{% url 'user_login' %}">Sign in</a></p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <p class="error-msg">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <form action="{% url 'user_register' %}" method="POST">
                {% csrf_token %}
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="full_name">Full Name</label>
                        <input type="text" name="full_name" id="full_name" class="input-field" placeholder="Rahul Sharma" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" name="email" id="email" class="input-field" placeholder="name@company.com" required>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="phone-input-group">
                            <select name="country_code" class="input-field">
                                <option value="+91">+91 (IN)</option>
                                <option value="+1">+1 (US)</option>
                            </select>
                            <input type="tel" name="phone" class="input-field" placeholder="98765 43210" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="location">City / Location</label>
                        <input type="text" name="location" id="location" class="input-field" placeholder="Mumbai, MH" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company Name (Optional)</label>
                        <input type="text" name="company" id="company" class="input-field" placeholder="BuildRight Pvt Ltd">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" name="confirm_password" id="confirm_password" class="input-field" required>
                    </div>
                </div>

                <div style="margin-top: 15px;">
                    <input type="checkbox" name="terms" id="terms" required>
                    <label for="terms" style="font-size: 13px; color: #64748b;">I agree to the Terms & Privacy Policy</label>
                </div>

                <button type="submit" class="btn-submit">Create My Account</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
